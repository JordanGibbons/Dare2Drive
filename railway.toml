[deploy]
numReplicas = 1

[[services]]
name = "bot"
buildCommand = "docker build -f docker/Dockerfile.prod --target runtime -t dare2drive-bot ."
startCommand = "python -m bot.main"

[services.variables]
DATABASE_URL = "${{Postgres.DATABASE_URL}}"
REDIS_URL = "${{Redis.REDIS_URL}}"
TEMPO_URL = "${{tempo.RAILWAY_PRIVATE_DOMAIN}}:4318"

[[services]]
name = "api"
buildCommand = "docker build -f docker/Dockerfile.prod --target runtime -t dare2drive-api ."
startCommand = "uvicorn api.main:app --host 0.0.0.0 --port ${PORT:-8000}"

[services.variables]
DATABASE_URL = "${{Postgres.DATABASE_URL}}"
REDIS_URL = "${{Redis.REDIS_URL}}"
TEMPO_URL = "${{tempo.RAILWAY_PRIVATE_DOMAIN}}:4318"

[[services]]
name = "postgres-exporter"
watchPatterns = ["Dockerfile.postgres-exporter"]

[[services]]
name = "redis-exporter"
watchPatterns = ["Dockerfile.redis-exporter"]

[[services]]
name = "ntfy-relay"
buildCommand = "docker build -f monitoring/ntfy-relay/Dockerfile -t ntfy-relay monitoring/ntfy-relay/"
startCommand = "uvicorn relay:app --host 0.0.0.0 --port 9096"

[[services]]
name = "alertmanager"
buildCommand = "docker build -f monitoring/alertmanager/Dockerfile -t alertmanager monitoring/alertmanager/"
startCommand = ""

[[services]]
name = "scheduler-worker"
buildCommand = "docker build -f docker/Dockerfile.prod --target runtime -t dare2drive-scheduler ."
startCommand = "python -m scheduler.worker"

[services.variables]
DATABASE_URL = "${{Postgres.DATABASE_URL}}"
REDIS_URL = "${{Redis.REDIS_URL}}"
TEMPO_URL = "${{tempo.RAILWAY_PRIVATE_DOMAIN}}:4318"

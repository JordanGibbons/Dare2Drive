name: CI

on:
  push:
    branches: [main, demo]
  pull_request:
    branches: [main, demo]

permissions:
  contents: read

jobs:
  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pre-commit/action@v3.0.1

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ruff black

      - name: Run Ruff
        run: ruff check .

      - name: Check Black formatting
        run: black --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dare2drive
          POSTGRES_PASSWORD: dare2drive
          POSTGRES_DB: dare2drive
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql+asyncpg://dare2drive:dare2drive@localhost:5432/dare2drive"
      TEST_DATABASE_URL: "postgresql+asyncpg://dare2drive:dare2drive@localhost:5432/dare2drive"
      REDIS_URL: "redis://localhost:6379/0"
      DISCORD_TOKEN: "test-token"
      ENVIRONMENT: "development"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Apply Alembic migrations
        run: alembic upgrade head

      - name: Run tests with coverage
        run: pytest --cov --cov-report=xml --cov-report=term-missing -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build dev image
        run: docker build -f docker/Dockerfile.dev -t dare2drive-dev .

      - name: Build prod image
        run: docker build -f docker/Dockerfile.prod -t dare2drive-prod .

services:
  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    command: watchfiles --filter python "python -m bot.main" .
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://dare2drive:dare2drive@db:5432/dare2drive
      - REDIS_URL=redis://redis:6379/0
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - API_SECRET_KEY=${API_SECRET_KEY}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dare2drive_net
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://dare2drive:dare2drive@db:5432/dare2drive
      - REDIS_URL=redis://redis:6379/0
      - SKIP_MIGRATIONS=true
      - LOG_FORMAT=${LOG_FORMAT:-json}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dare2drive_net
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dare2drive
      POSTGRES_PASSWORD: dare2drive
      POSTGRES_DB: dare2drive
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dare2drive -d dare2drive"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dare2drive_net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dare2drive_net

  # ---------------------------------------------------------------------------
  # Local metrics stack  (opt-in — start with: d2d up --monitoring)
  # Scrapes the API's /metrics endpoint and exposes Grafana at localhost:3000.
  # First run: add Prometheus datasource at http://prometheus:9090 in Grafana UI.
  # ---------------------------------------------------------------------------

  prometheus:
    image: prom/prometheus:v2.52.0
    profiles: [monitoring]
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/local/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    depends_on:
      - api
    networks:
      - dare2drive_net
    restart: unless-stopped

  grafana:
    build:
      context: ./monitoring/local/grafana
      dockerfile: dockerfile
    profiles: [monitoring]
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-dare2drive}
      - GF_AUTH_ANONYMOUS_ENABLED=false
    depends_on:
      - prometheus
    networks:
      - dare2drive_net
    restart: unless-stopped

volumes:
  pgdata:
  prometheus_data:
  grafana_data:

networks:
  dare2drive_net:
    driver: bridge

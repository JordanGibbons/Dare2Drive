services:
  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    command: watchfiles --filter python "python -m bot.main" .
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://dare2drive:dare2drive@db:5432/dare2drive
      - REDIS_URL=redis://redis:6379/0
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - API_SECRET_KEY=${API_SECRET_KEY}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dare2drive_net
    restart: unless-stopped
    logging:
      driver: fluentd
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        tag: "dare2drive.bot"

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://dare2drive:dare2drive@db:5432/dare2drive
      - REDIS_URL=redis://redis:6379/0
      - SKIP_MIGRATIONS=true
      - LOG_FORMAT=${LOG_FORMAT:-json}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dare2drive_net
    restart: unless-stopped
    logging:
      driver: fluentd
      options:
        fluentd-address: "localhost:24224"
        fluentd-async: "true"
        tag: "dare2drive.api"

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dare2drive
      POSTGRES_PASSWORD: dare2drive
      POSTGRES_DB: dare2drive
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dare2drive -d dare2drive"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dare2drive_net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dare2drive_net

  # ---------------------------------------------------------------------------
  # Monitoring stack
  # ---------------------------------------------------------------------------

  fluent-bit:
    image: fluent/fluent-bit:3.3
    ports:
      - "24224:24224"     # Forward protocol (Docker log driver)
      - "24224:24224/udp"
      - "2020:2020"       # Internal HTTP metrics
    volumes:
      - ./monitoring/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./monitoring/fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - fluentbit_db:/fluent-bit/db
    environment:
      - LOKI_HOST=loki
      - LOKI_PORT=3100
    depends_on:
      - loki
    networks:
      - dare2drive_net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.52.0
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    depends_on:
      - api
    networks:
      - dare2drive_net
    restart: unless-stopped

  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - dare2drive_net
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.27.0
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    depends_on:
      - ntfy-relay
    networks:
      - dare2drive_net
    restart: unless-stopped

  ntfy-relay:
    build:
      context: ./monitoring/ntfy-relay
      dockerfile: Dockerfile
    ports:
      - "9096:9096"
    environment:
      - NTFY_URL=${NTFY_URL:-https://ntfy.sh}
      - NTFY_TOPIC=${NTFY_TOPIC:-}
      - NTFY_TOKEN=${NTFY_TOKEN:-}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - DISCORD_WEBHOOK_URL_CRITICAL=${DISCORD_WEBHOOK_URL_CRITICAL:-}
    networks:
      - dare2drive_net
    restart: unless-stopped

  grafana:
    image: grafana/grafana-oss:11.1.0
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-dare2drive}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_FEATURE_TOGGLES_ENABLE=lokiLogs
    depends_on:
      - prometheus
      - loki
    networks:
      - dare2drive_net
    restart: unless-stopped

volumes:
  pgdata:
  prometheus_data:
  loki_data:
  alertmanager_data:
  grafana_data:
  fluentbit_db:

networks:
  dare2drive_net:
    driver: bridge

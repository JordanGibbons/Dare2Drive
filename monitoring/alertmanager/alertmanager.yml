global: {}

# Default receiver for any alert that does not match a more specific route.
route:
  receiver: all_channels
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Critical alerts page immediately with a shorter repeat.
    - match:
        severity: critical
      receiver: all_channels
      repeat_interval: 30m

receivers:
  - name: all_channels
    webhook_configs:
      # The relay fans out to both ntfy.sh (phone push) and the Discord webhook.
      # Configure NTFY_TOPIC and/or DISCORD_WEBHOOK_URL on the ntfy-relay service.
      # Either destination is optional — leave the env var empty to disable it.
      - url: "http://ntfy-relay:9096/alerts"
        send_resolved: true
        max_alerts: 10
        http_config:
          follow_redirects: true

inhibit_rules:
  # Don't send warning if a critical alert is already firing for the same target.
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname"]

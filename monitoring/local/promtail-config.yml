server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["service"]
    relabel_configs:
      # Extract container name
      - source_labels: [__meta_docker_container_name]
        target_label: container
      # Extract service label
      - source_labels: [__meta_docker_container_label_service]
        target_label: service
      # Extract compose project
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: compose_project
      # Only keep containers with service label
      - source_labels: [__meta_docker_container_label_service]
        action: keep
        regex: ".+"
    pipeline_stages:
      # Parse JSON logs
      - json:
          expressions:
            ts: ts
            level: level
            logger: logger
            msg: msg
            traceID: traceID
            spanID: spanID
            exc: exc
      # Use timestamp from log if present
      - timestamp:
          source: ts
          format: RFC3339
      # Set log level from parsed field (don't label traceID - too high cardinality)
      - labels:
          level:
      # Output the message
      - output:
          source: msg

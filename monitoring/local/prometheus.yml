global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: dare2drive_api
    scrape_interval: 15s
    static_configs:
      - targets: [api:8000]

  - job_name: dare2drive_bot
    scrape_interval: 15s
    static_configs:
      - targets: [bot:8001]

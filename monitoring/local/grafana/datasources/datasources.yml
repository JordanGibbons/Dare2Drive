apiVersion: 1

datasources:
  - name: Tempo
    type: tempo
    access: proxy
    orgId: 1
    uid: grafana_tempo
    url: http://tempo:3200
    jsonData:
      tracesToLogsV2:
        datasourceUid: grafana_loki
        spanStartTimeShift: '-1h'
        spanEndTimeShift: '1h'
        filterByTraceID: false
        filterBySpanID: false
        customQuery: true
        query: '{service=~"dare2drive.*"} | json | traceID=`$${__trace.traceId}`'
      tracesToMetrics:
        datasourceUid: grafana_prometheus
        spanStartTimeShift: '-1h'
        spanEndTimeShift: '1h'

  - name: Loki
    type: loki
    access: proxy
    orgId: 1
    uid: grafana_loki
    url: http://loki:3100
    isDefault: false
    jsonData:
      derivedFields:
        - datasourceUid: grafana_tempo
          matcherRegex: 'traceID=(\w+)'
          name: traceID
          url: '$${__value.raw}'
          urlDisplayLabel: 'View Trace'

  - name: Prometheus
    type: prometheus
    access: proxy
    orgId: 1
    uid: grafana_prometheus
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      exemplarTraceIdDestinations:
        - name: traceID
          datasourceUid: grafana_tempo

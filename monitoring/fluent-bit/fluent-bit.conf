# Fluent Bit configuration for Dare2Drive
# Collects Docker container logs, parses JSON lines, and forwards to Loki.
#
# In production (Railway) use the Forward input and point services at this
# Fluent Bit instance, or run Fluent Bit as a sidecar/daemonset.

[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

# ---------------------------------------------------------------------------
# INPUT — read from Docker log files (local dev via volume mount)
# ---------------------------------------------------------------------------

[INPUT]
    Name              tail
    Tag               dare2drive.*
    Path              /var/lib/docker/containers/*/*.log
    Parser            docker
    DB                /fluent-bit/db/flb_docker.db
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On
    Refresh_Interval  10

# ---------------------------------------------------------------------------
# INPUT — Forward protocol (used when containers log via fluentd log-driver)
# ---------------------------------------------------------------------------

[INPUT]
    Name        forward
    Listen      0.0.0.0
    Port        24224
    Buffer_Chunk_Size 1M
    Buffer_Max_Size   10M

# ---------------------------------------------------------------------------
# FILTER — try to parse JSON log messages emitted when LOG_FORMAT=json
# ---------------------------------------------------------------------------

[FILTER]
    Name         parser
    Match        dare2drive.*
    Key_Name     log
    Parser       json_log
    Reserve_Data On
    Preserve_Key Off

# ---------------------------------------------------------------------------
# FILTER — attach static labels so Grafana / Loki can slice by service
# ---------------------------------------------------------------------------

[FILTER]
    Name    record_modifier
    Match   dare2drive.bot*
    Record  service bot

[FILTER]
    Name    record_modifier
    Match   dare2drive.api*
    Record  service api

# ---------------------------------------------------------------------------
# OUTPUT — Loki  (Grafana log aggregation)
# ---------------------------------------------------------------------------

[OUTPUT]
    Name            loki
    Match           dare2drive.*
    Host            ${LOKI_HOST}
    Port            ${LOKI_PORT}
    Labels          job=dare2drive, service=$service
    Label_Keys      $level,$logger
    Line_Format     json
    auto_kubernetes_labels off

# ---------------------------------------------------------------------------
# OUTPUT — stdout (debug / local dev fallback)
# ---------------------------------------------------------------------------

[OUTPUT]
    Name   stdout
    Match  dare2drive.*
    Format json_lines

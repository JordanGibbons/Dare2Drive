groups:
  - name: dare2drive_api
    interval: 30s
    rules:
      # API is down — no scrape in 60 s
      - alert: ApiDown
        expr: up{job="dare2drive_api"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Dare2Drive API is unreachable"
          description: "Prometheus cannot scrape the API /metrics endpoint. The service may be crashed."

      # 5xx error rate > 5 % over 5 min
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{job="dare2drive_api", status=~"5.."}[5m]))
            /
            sum(rate(http_requests_total{job="dare2drive_api"}[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High HTTP 5xx error rate"
          description: "More than 5 % of API requests are returning 5xx errors over the last 5 minutes."

      # Slow API — p99 latency > 2 s
      - alert: SlowApiResponse
        expr: |
          histogram_quantile(
            0.99,
            sum(rate(http_request_duration_seconds_bucket{job="dare2drive_api"}[5m])) by (le)
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "API p99 latency above 2 s"
          description: "The 99th-percentile response time has exceeded 2 seconds for 5 minutes."

  - name: dare2drive_infra
    interval: 30s
    rules:
      # Fluent Bit stopped shipping
      - alert: FluentBitDown
        expr: up{job="fluent_bit"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Fluent Bit log shipper is down"
          description: "Prometheus cannot reach Fluent Bit. Logs may not be forwarded to Loki."

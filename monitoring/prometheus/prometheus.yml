global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    app: dare2drive

# Load alerting rules from the alertmanager rules file.
rule_files:
  - /etc/prometheus/rules/*.yml

# Send alerts to Alertmanager.
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # Dare2Drive FastAPI — exposes /metrics via prometheus-fastapi-instrumentator
  - job_name: dare2drive_api
    static_configs:
      - targets:
          - api:8000
    metrics_path: /metrics

  # Fluent Bit internal metrics
  - job_name: fluent_bit
    static_configs:
      - targets:
          - fluent-bit:2020
    metrics_path: /api/v1/metrics/prometheus

  # Prometheus itself
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090
